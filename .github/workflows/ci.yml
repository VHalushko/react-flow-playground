name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: sentinel-flow

jobs:
  lint-and-typecheck:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel-flow/package-lock.json

      - run: npm ci

      - name: NX affected lint
        run: npx nx affected --target=lint --base=origin/main --head=HEAD

      - name: NX affected typecheck
        run: npx nx affected --target=typecheck --base=origin/main --head=HEAD

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel-flow/package-lock.json

      - run: npm ci

      - name: NX affected test
        run: npx nx affected --target=test --base=origin/main --head=HEAD --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel-flow/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Build app
        run: npx nx build @sentinel-flow/web

      - name: Run e2e
        run: npx nx e2e @sentinel-flow/web-e2e
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinel-flow/package-lock.json

      - run: npm ci

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

      - name: npm audit
        run: npm audit --audit-level=high
